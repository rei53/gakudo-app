<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>学童アプリ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --text: #1a1a18; --text2: #6b6b67;
      --text3: #9f9f9b; --bd: rgba(0,0,0,.10); --bdh: rgba(0,0,0,.22);
      --r: 8px; --rl: 14px; --accent: #4f46e5;
    }
    @media(prefers-color-scheme:dark){
      :root{--bg:#1e1e1c;--bg2:#2a2a28;--text:#f0f0ee;--text2:#a0a09c;--text3:#6a6a68;--bd:rgba(255,255,255,.10);--bdh:rgba(255,255,255,.22);}
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; }

    nav { background: var(--bg); border-bottom: .5px solid var(--bd); padding: 0 1.5rem; display: flex; align-items: center; height: 52px; }
    .nav-brand { font-size: 15px; font-weight: 700; color: var(--accent); display: flex; align-items: center; gap: 7px; text-decoration: none; margin-right: 24px; }
    .nav-link { height: 52px; padding: 0 14px; display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 500; color: var(--text2); text-decoration: none; border-bottom: 2px solid transparent; }
    .nav-link:hover { color: var(--text); background: var(--bg2); }
    .nav-link.active { color: var(--accent); border-bottom-color: var(--accent); }

    .hero { text-align: center; padding: 3rem 1rem 2rem; }
    .hero-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .hero-sub { font-size: 15px; color: var(--text2); }

    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 16px; max-width: 800px; margin: 0 auto; padding: 0 1rem 3rem; }
    .card { background: var(--bg); border: .5px solid var(--bd); border-radius: var(--rl); padding: 24px; text-decoration: none; color: var(--text); display: flex; flex-direction: column; gap: 10px; transition: box-shadow .15s, border-color .15s; }
    .card:hover { border-color: var(--bdh); box-shadow: 0 4px 20px rgba(0,0,0,.08); }
    .card-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .card-icon.purple { background: #EEEDFE; color: #4f46e5; }
    .card-icon.green  { background: #EAF3DE; color: #27500A; }
    .card-title { font-size: 17px; font-weight: 600; }
    .card-desc { font-size: 13px; color: var(--text2); line-height: 1.6; }
    .card-arrow { font-size: 13px; color: var(--text3); margin-top: auto; display: flex; align-items: center; gap: 4px; }
  </style>
</head>
<body>

  <nav>
    <a class="nav-brand" href="index.html"><i class="ti ti-building"></i> 学童アプリ</a>
    <a class="nav-link active" href="index.html"><i class="ti ti-home"></i> ホーム</a>
    <a class="nav-link" href="shift.html"><i class="ti ti-calendar-event"></i> シフト表</a>
    <a class="nav-link" href="board.html"><i class="ti ti-message-2"></i> 掲示板</a>
  </nav>

  <div class="hero">
    <div class="hero-title">🏫 学童アプリ</div>
    <div class="hero-sub">シフト管理・掲示板をまとめて使えます</div>
  </div>

  <div class="cards">
    <a class="card" href="shift.html">
      <div class="card-icon purple"><i class="ti ti-calendar-event"></i></div>
      <div class="card-title">シフト表</div>
      <div class="card-desc">スタッフの勤務シフトをカレンダーで管理。希望登録から自動作成まで対応。</div>
      <div class="card-arrow">開く <i class="ti ti-arrow-right"></i></div>
    </a>
    <a class="card" href="board.html">
      <div class="card-icon green"><i class="ti ti-message-2"></i></div>
      <div class="card-title">掲示板</div>
      <div class="card-desc">スタッフ間の連絡・お知らせを投稿・共有できる掲示板。</div>
      <div class="card-arrow">開く <i class="ti ti-arrow-right"></i></div>
    </a>
  </div>

</body>
</html>
