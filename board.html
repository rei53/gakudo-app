<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>掲示板 | 学童アプリ</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:#ffffff; --bg2:#f5f5f3; --text:#1a1a18; --text2:#6b6b67;
      --text3:#9f9f9b; --bd:rgba(0,0,0,.12); --bdh:rgba(0,0,0,.25);
      --r:8px; --rl:12px; --accent:#4f46e5;
    }
    @media(prefers-color-scheme:dark){
      :root{--bg:#1e1e1c;--bg2:#2a2a28;--text:#f0f0ee;--text2:#a0a09c;--text3:#6a6a68;--bd:rgba(255,255,255,.12);--bdh:rgba(255,255,255,.25);}
    }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:var(--bg2); color:var(--text); min-height:100vh; }

    nav { background:var(--bg); border-bottom:.5px solid var(--bd); padding:0 1.2rem; display:flex; align-items:center; height:48px; }
    .nav-brand { font-size:14px; font-weight:700; color:var(--accent); display:flex; align-items:center; gap:6px; text-decoration:none; margin-right:20px; }
    .nav-link { height:48px; padding:0 12px; display:flex; align-items:center; gap:5px; font-size:13px; font-weight:500; color:var(--text2); text-decoration:none; border-bottom:2px solid transparent; }
    .nav-link:hover { color:var(--text); background:var(--bg2); }
    .nav-link.active { color:var(--accent); border-bottom-color:var(--accent); }

    .app { max-width:600px; margin:0 auto; padding:1rem; }

    .page-title { font-size:20px; font-weight:600; display:flex; align-items:center; gap:8px; margin:1rem 0; }

    .post-form { background:var(--bg); border:.5px solid var(--bdh); border-radius:var(--rl); padding:16px; margin-bottom:1.25rem; display:flex; flex-direction:column; gap:10px; }
    .form-title { font-size:13px; font-weight:500; color:var(--text2); display:flex; align-items:center; gap:6px; }
    .form-row { display:flex; gap:8px; align-items:center; }
    .form-label { font-size:13px; color:var(--text2); white-space:nowrap; min-width:42px; }
    .form-input { flex:1; height:38px; padding:0 12px; border:.5px solid var(--bd); border-radius:var(--r); font-size:14px; background:var(--bg2); color:var(--text); outline:none; font-family:inherit; }
    .form-input:focus { box-shadow:0 0 0 2px rgba(79,70,229,.2); border-color:var(--accent); }
    .form-input::placeholder { color:var(--text3); }
    textarea.form-input { height:auto; padding:10px 12px; resize:vertical; min-height:72px; line-height:1.5; }
    .submit-btn { height:38px; padding:0 18px; border:none; border-radius:var(--r); background:var(--accent); color:#fff; font-size:14px; font-weight:500; cursor:pointer; display:flex; align-items:center; gap:6px; align-self:flex-end; }
    .submit-btn:hover { opacity:.88; }
    .submit-btn:disabled { opacity:.4; cursor:not-allowed; }
    .toast { font-size:12px; padding:5px 9px; border-radius:var(--r); display:none; }
    .toast.ok  { background:#EAF3DE; color:#27500A; display:block; }
    .toast.err { background:#FCEBEB; color:#A32D2D; display:block; }
    .toast.loading { background:#E6F1FB; color:#0C447C; display:block; }

    .posts-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:.75rem; }
    .posts-count { font-size:13px; color:var(--text3); }
    .reload-btn { height:28px; padding:0 10px; border:.5px solid var(--bd); border-radius:var(--r); background:transparent; color:var(--text2); font-size:12px; cursor:pointer; display:flex; align-items:center; gap:4px; }
    .reload-btn:hover { background:var(--bg); color:var(--text); }

    .posts { display:flex; flex-direction:column; gap:10px; }
    .post-card { background:var(--bg); border:.5px solid var(--bd); border-radius:var(--rl); padding:14px; }
    .post-card:hover { border-color:var(--bdh); }
    .post-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .post-author { display:flex; align-items:center; gap:8px; }
    .avatar { width:28px; height:28px; border-radius:50%; background:#EEEDFE; color:var(--accent); display:flex; align-items:center; justify-content:center; font-size:13px; font-weight:600; flex-shrink:0; }
    .author-name { font-size:13px; font-weight:500; }
    .post-time { font-size:11px; color:var(--text3); }
    .post-content { font-size:14px; line-height:1.65; white-space:pre-wrap; word-break:break-word; }
    .del-btn { width:26px; height:26px; border:none; background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; border-radius:var(--r); color:var(--text3); font-size:14px; }
    .del-btn:hover { background:#FCEBEB; color:#A32D2D; }
    .empty { text-align:center; padding:3rem 0; color:var(--text3); font-size:14px; }
    .empty i { font-size:30px; display:block; margin-bottom:8px; }
    .loading-wrap { text-align:center; padding:2rem 0; color:var(--text3); font-size:13px; display:flex; align-items:center; justify-content:center; gap:8px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin 1s linear infinite; display:inline-block; }
  </style>
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html"><i class="ti ti-building"></i> 学童アプリ</a>
  <a class="nav-link" href="index.html"><i class="ti ti-home"></i> ホーム</a>
  <a class="nav-link" href="shift.html"><i class="ti ti-calendar-event"></i> シフト表</a>
  <a class="nav-link active" href="board.html"><i class="ti ti-message-2"></i> 掲示板</a>
</nav>

<div class="app">
  <div class="page-title"><i class="ti ti-message-2"></i> 掲示板</div>

  <div class="post-form">
    <div class="form-title"><i class="ti ti-pencil"></i> 新しい投稿</div>
    <div class="form-row">
      <span class="form-label">名前</span>
      <input type="text" id="post-name" class="form-input" placeholder="あなたの名前（任意）" maxlength="50" />
    </div>
    <textarea id="post-body" class="form-input" placeholder="内容を入力してください... (Ctrl+Enter で投稿)" maxlength="1000" rows="3"></textarea>
    <div id="form-toast" class="toast"></div>
    <button class="submit-btn" id="submit-btn" onclick="submitPost()">
      <i class="ti ti-send"></i> 投稿する
    </button>
  </div>

  <div class="posts-hd">
    <span class="posts-count" id="posts-count"></span>
    <button class="reload-btn" onclick="loadPosts()"><i class="ti ti-refresh"></i> 更新</button>
  </div>
  <div class="posts" id="posts-list"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://fkdjlgoxywjgesmttejz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZrZGpsZ294eXdqZ2VzbXR0ZWp6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5MjU0OTgsImV4cCI6MjA5NzUwMTQ5OH0.ivuabZgXB4mYc0HEzkjBzIhQmFlDlt9IG0hqMUuW6IU';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);
  const TABLE = 'posts';

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function formatTime(iso){
    const d=new Date(iso), now=new Date(), diff=(now-d)/1000;
    if(diff<60)return'たった今';
    if(diff<3600)return`${Math.floor(diff/60)}分前`;
    if(diff<86400)return`${Math.floor(diff/3600)}時間前`;
    const mm=String(d.getMonth()+1).padStart(2,'0'), dd=String(d.getDate()).padStart(2,'0');
    const hh=String(d.getHours()).padStart(2,'0'), mi=String(d.getMinutes()).padStart(2,'0');
    return`${d.getFullYear()}/${mm}/${dd} ${hh}:${mi}`;
  }

  function getInitial(name){ if(!name)return'?'; return[...name.trim()][0].toUpperCase(); }

  function setToast(msg,type){ const el=document.getElementById('form-toast'); el.className='toast '+type; el.textContent=msg; }
  function clearToast(){ const el=document.getElementById('form-toast'); el.className='toast'; el.textContent=''; }

  async function loadPosts(){
    const list=document.getElementById('posts-list');
    list.innerHTML='<div class="loading-wrap"><i class="ti ti-loader-2 spin"></i> 読み込み中...</div>';
    const{data,error}=await db.from(TABLE).select('*').order('created_at',{ascending:false});
    if(error){
      list.innerHTML=`<div class="empty"><i class="ti ti-alert-circle"></i>読み込みに失敗しました<br><small>${esc(error.message)}</small></div>`;
      document.getElementById('posts-count').textContent='';return;
    }
    document.getElementById('posts-count').textContent=`${data.length} 件の投稿`;
    if(!data.length){list.innerHTML='<div class="empty"><i class="ti ti-mood-smile"></i>まだ投稿がありません</div>';return;}
    list.innerHTML=data.map(p=>{
      const name=p.name?.trim()||'匿名';
      const timeStr=p.created_at?formatTime(p.created_at):`#${p.id}`;
      return`<div class="post-card" id="card-${p.id}">
        <div class="post-header">
          <div class="post-author">
            <div class="avatar">${esc(getInitial(name))}</div>
            <span class="author-name">${esc(name)}</span>
            <span class="post-time">${timeStr}</span>
          </div>
          <button class="del-btn" onclick="deletePost(${p.id})" title="削除"><i class="ti ti-trash"></i></button>
        </div>
        <div class="post-content">${esc(p.body??p.content??'')}</div>
      </div>`;
    }).join('');
  }

  async function deletePost(id){
    if(!confirm('この投稿を削除しますか？'))return;
    const{error}=await db.from(TABLE).delete().eq('id',id);
    if(error){alert('削除エラー: '+error.message);return;}
    await loadPosts();
  }

  async function submitPost(){
    const nameEl=document.getElementById('post-name');
    const bodyEl=document.getElementById('post-body');
    const btn=document.getElementById('submit-btn');
    const body=bodyEl.value.trim();
    if(!body){setToast('内容を入力してください','err');bodyEl.focus();return;}
    btn.disabled=true;setToast('投稿中...','loading');
    const{error}=await db.from(TABLE).insert([{body,name:nameEl.value.trim()||null}]);
    if(error){setToast('エラー: '+error.message,'err');btn.disabled=false;return;}
    bodyEl.value='';clearToast();btn.disabled=false;
    await loadPosts();
  }

  document.getElementById('post-body').addEventListener('keydown',e=>{
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter')submitPost();
  });

  db.channel('board-realtime')
    .on('postgres_changes',{event:'*',schema:'public',table:TABLE},()=>loadPosts())
    .subscribe();

  loadPosts();
</script>
</body>
</html>
